apiVersion: apps/v1
kind: Deployment
metadata:
  name: gatus
  namespace: gatus
spec:
  replicas: 3
  selector:
    matchLabels:
      app: gatus
  template:
    metadata:
      labels:
        app: gatus
    spec:
      securityContext:
        fsGroup: 1000   # ✅ Correct location (pod-level)

      containers:
        - name: gatus
          image: twinproduction/gatus:latest
          ports:
            - containerPort: 8080
          env:
            - name: GATUS_CONFIG_PATH
              value: "/config"
          volumeMounts:
            - name: gatus-config
              mountPath: /config

      volumes:
        - name: gatus-config
          persistentVolumeClaim:
            claimName: gatus-nfs-pvc